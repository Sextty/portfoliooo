<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <rect width="48" height="48" fill="#0B1E36"/>
  <!-- drawing frame -->
  <rect x="4" y="4" width="40" height="40" fill="none" stroke="#7FA3C9" stroke-width="1.5"/>
  <!-- corner ticks -->
  <g stroke="#7FA3C9" stroke-width="1.5">
    <path d="M4 12 L4 4 L12 4"/>
    <path d="M44 12 L44 4 L36 4"/>
    <path d="M4 36 L4 44 L12 44"/>
    <path d="M44 36 L44 44 L36 44"/>
  </g>
  <!-- WJ monogram -->
  <text x="24" y="30" text-anchor="middle" font-family="Archivo, Arial, sans-serif" font-weight="800" font-size="17" letter-spacing="0.5" fill="#E6EEF7">WJ</text>
  <!-- redline tick -->
  <rect x="18" y="37" width="12" height="2" fill="#FF5C39"/>
</svg>
